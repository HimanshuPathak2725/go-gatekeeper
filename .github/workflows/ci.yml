name: Contributor CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # needed to post review comments

jobs:
  # ── Build & Quality Checks ─────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build CLI
        run: go build -v ./cmd/cli

      - name: Build Server
        run: go build -v ./cmd/server

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # ── AI Code Review via Gemini REST API ────────────────────────────────────
  #
  #  Requires: GEMINI_API_KEY secret
  #    1. Go to https://aistudio.google.com/app/apikey
  #    2. Click "Create API key" (free, no card needed)
  #    3. Add as repo secret named GEMINI_API_KEY
  #
  ai-review:
    name: Gemini AI Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -c 8000)

          if [ -z "$DIFF" ]; then
            echo "No file changes in this PR — skipping Gemini review."
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "$DIFF" > /tmp/pr_diff.txt
            echo "empty=false" >> $GITHUB_OUTPUT
            echo "Diff captured ($(wc -c < /tmp/pr_diff.txt) bytes)"
          fi

      - name: Review with Gemini
        id: gemini
        if: steps.diff.outputs.empty != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr_diff.txt)

          REQUEST=$(jq -n \
            --arg diff "$DIFF" \
            '{
              "contents": [{
                "parts": [{
                  "text": ("You are a senior Go/JavaScript code reviewer. Review this PR diff.\n\nFocus on: bugs, security issues, performance, Go best practices, error handling.\n\nBe concise and specific. Max 500 words.\n\nDiff:\n" + $diff)
                }]
              }],
              "generationConfig": { "temperature": 0.3, "maxOutputTokens": 1024 }
            }')

          # Capture HTTP status AND response body separately
          # NOTE: New AQ. format keys require X-goog-api-key HEADER (not ?key= URL param)
          HTTP_STATUS=$(curl -s -o /tmp/gemini_raw.json -w "%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "X-goog-api-key: $GEMINI_API_KEY" \
            -d "$REQUEST")

          echo "=== HTTP Status: $HTTP_STATUS ==="
          echo "=== Raw Response ==="
          cat /tmp/gemini_raw.json

          # Parse based on status
          if [ "$HTTP_STATUS" = "200" ]; then
            jq -r '.candidates[0].content.parts[0].text // "⚠️ Unexpected empty response from Gemini."' \
              /tmp/gemini_raw.json > /tmp/gemini_review.txt
            echo "review_ready=true" >> $GITHUB_OUTPUT
          elif [ "$HTTP_STATUS" = "429" ]; then
            echo "⚠️ Gemini rate limit hit (429). Free tier allows ~2 req/min. Try again in a minute." \
              > /tmp/gemini_review.txt
            echo "review_ready=true" >> $GITHUB_OUTPUT
          elif [ "$HTTP_STATUS" = "400" ] || [ "$HTTP_STATUS" = "403" ]; then
            echo "❌ Gemini API key is invalid or missing. Add GEMINI_API_KEY to repo secrets." \
              > /tmp/gemini_review.txt
            echo "review_ready=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Gemini API error (HTTP $HTTP_STATUS). Check the workflow logs for details." \
              > /tmp/gemini_review.txt
            echo "review_ready=true" >> $GITHUB_OUTPUT
          fi

          echo "=== Review Output ==="
          cat /tmp/gemini_review.txt

      - name: Post review comment
        if: steps.gemini.outputs.review_ready == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/gemini_review.txt', 'utf8').trim();
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `## 🤖 Gemini AI Code Review\n\n${review}\n\n---\n*Reviewed by Gemini 2.0 Flash · [View run](${runUrl})*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });
